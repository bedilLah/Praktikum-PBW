<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Cek Nilai Mahasiswa</title>
</head>
<body>

    <h2>Cek Nilai Mahasiswa</h2>

    <label>NIM:</label><br>
    <input type="text" id="nim"><br>

    <label>Nilai:</label><br>
    <input type="number" id="nilai"><br><br>

    <button onclick="cekNilai()">Cek Nilai</button>

    <p id="hasil"></p>

    <script>
        function cekNilai() {
            let nim = document.getElementById("nim").value;
            let nilai = document.getElementById("nilai").value;
            let hasil = document.getElementById("hasil");

            if (nilai < 0 || nilai > 100 || nilai === "") {
                hasil.innerHTML = "Nilai tidak valid!";
                return;
            }

            let huruf;

            if (nilai >= 80 && nilai <= 100) {
                huruf = "A";
            } else if (nilai >= 70) {
                huruf = "B";
            } else if (nilai >= 60) {
                huruf = "C";
            } else if (nilai >= 50) {
                huruf = "D";
            } else {
                huruf = "E";
            }

            hasil.innerHTML = "NIM: " + nim + "<br>Huruf Mutu: " + huruf;
        }
    </script>

</body>
</html>
